<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Carta de Amor 💌</title>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            min-height: 100vh;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            padding: 20px;\n        }\n\n        .container {\n            width: 100%;\n            max-width: 800px;\n            background: linear-gradient(135deg, #fff5f7 0%, #ffe0ec 100%);\n            border-radius: 20px;\n            padding: 40px;\n            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);\n            position: relative;\n            overflow: hidden;\n        }\n\n        .container::before {\n            content: '';\n            position: absolute;\n            top: -50%;\n            right: -50%;\n            width: 500px;\n            height: 500px;\n            background: radial-gradient(circle, rgba(255, 192, 203, 0.3), transparent);\n            border-radius: 50%;\n            animation: float 6s ease-in-out infinite;\n        }\n\n        .content {\n            position: relative;\n            z-index: 1;\n        }\n\n        h1 {\n            text-align: center;\n            color: #ff1493;\n            font-size: 2.5em;\n            margin-bottom: 10px;\n            text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.2);\n            animation: pulse 2s ease-in-out infinite;\n        }\n\n        .subtitle {\n            text-align: center;\n            color: #ff69b4;\n            margin-bottom: 30px;\n            font-size: 1.1em;\n            letter-spacing: 2px;\n        }\n\n        .stars {\n            text-align: center;\n            font-size: 1.5em;\n            margin-bottom: 30px;\n            letter-spacing: 10px;\n            animation: twinkle 2s ease-in-out infinite;\n        }\n\n        .carta {\n            background: white;\n            border-radius: 15px;\n            padding: 30px;\n            min-height: 300px;\n            color: #333;\n            line-height: 1.8;\n            font-size: 1.1em;\n            box-shadow: inset 0 0 20px rgba(255, 192, 203, 0.1);\n            margin-bottom: 30px;\n            border: 2px solid #ffc0cb;\n        }\n\n        .carta p {\n            margin-bottom: 15px;\n            text-align: center;\n            min-height: 30px;\n        }\n\n        .carta .linea {\n            opacity: 0;\n            animation: aparecerTexto 0.5s ease-in-out forwards;\n        }\n\n        @keyframes aparecerTexto {\n            from {\n                opacity: 0;\n                transform: translateY(10px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n\n        .botones {\n            display: flex;\n            gap: 15px;\n            justify-content: center;\n            flex-wrap: wrap;\n            margin-bottom: 30px;\n        }\n\n        button {\n            padding: 12px 30px;\n            font-size: 1em;\n            border: none;\n            border-radius: 25px;\n            cursor: pointer;\n            font-weight: bold;\n            transition: all 0.3s ease;\n            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);\n        }\n\n        .btn-leer {\n            background: linear-gradient(135deg, #ff1493, #ff69b4);\n            color: white;\n            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);\n        }\n\n        .btn-leer:hover {\n            transform: translateY(-3px);\n            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);\n        }\n\n        .btn-leer:active {\n            transform: translateY(-1px);\n        }\n\n        .btn-celebrar {\n            background: linear-gradient(135deg, #dc143c, #ff6b9d);\n            color: white;\n            box-shadow: 0 5px 15px rgba(220, 20, 60, 0.4);\n        }\n\n        .btn-celebrar:hover {\n            transform: translateY(-3px);\n            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.6);\n        }\n\n        .btn-celebrar:active {\n            transform: translateY(-1px);\n        }\n\n        .corazon {\n            position: fixed;\n            font-size: 2em;\n            animation: caer 3s linear forwards;\n            pointer-events: none;\n            z-index: 999;\n        }\n\n        @keyframes caer {\n            from {\n                transform: translateY(0) rotate(0deg);\n                opacity: 1;\n            }\n            to {\n                transform: translateY(100vh) rotate(360deg);\n                opacity: 0;\n            }\n        }\n\n        @keyframes float {\n            0%, 100% {\n                transform: translateY(0px) translateX(0px);\n            }\n            50% {\n                transform: translateY(-20px) translateX(20px);\n            }\n        }\n\n        @keyframes pulse {\n            0%, 100% {\n                transform: scale(1);\n            }\n            50% {\n                transform: scale(1.05);\n            }\n        }\n\n        @keyframes twinkle {\n            0%, 100% {\n                opacity: 1;\n            }\n            50% {\n                opacity: 0.5;\n            }\n        }\n\n        .pie {\n            text-align: center;\n            color: #999;\n            font-size: 0.9em;\n            margin-top: 20px;\n        }\n\n        .pie p {\n            margin: 5px 0;\n        }\n\n        .corazon-grande {\n            text-align: center;\n            font-size: 3em;\n            margin: 20px 0;\n            animation: latido 1.2s ease-in-out infinite;\n        }\n\n        @keyframes latido {\n            0%, 100% {\n                transform: scale(1);\n            }\n            25% {\n                transform: scale(1.1);\n            }\n            50% {\n                transform: scale(1);\n            }\n        }\n\n        @media (max-width: 600px) {\n            .container {\n                padding: 25px;\n            }\n\n            h1 {\n                font-size: 2em;\n            }\n\n            .carta {\n                padding: 20px;\n                font-size: 1em;\n            }\n\n            button {\n                padding: 10px 20px;\n                font-size: 0.95em;\n                width: 48%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"content\">\n            <h1>💌 Carta de Amor 💌</h1>\n            <div class=\"subtitle\">Para mi novia especial</div>\n            <div class=\"stars\">✨ ✨ ✨</div>\n\n            <div class=\"carta\" id=\"carta\">\n                <p style=\"font-style: italic; color: #999;\">Haz clic en 'Leer Carta' para comenzar...</p>\n            </div>\n\n            <div class=\"botones\">\n                <button class=\"btn-leer\" onclick=\"leerCarta()\">📖 Leer Carta</button>\n                <button class=\"btn-celebrar\" onclick=\"celebrar()\">❤️ Celebrar</button>\n            </div>\n\n            <div class=\"pie\">\n                <p>Creado con mucho amor 💕</p>\n                <p>Por: Tu amor especial</p>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        const cartaTexto = [\n            \"Hola mi amor ❤️\",\n            \"\",\n            \"Solo quería decirte que eres lo mejor que me ha pasado.\",\n            \"Cada día contigo es una bendición.\",\n            \"\",\n            \"Tu sonrisa ilumina mis días,\",\n            \"tu risa es mi música favorita,\",\n            \"y tu amor es mi razón de ser feliz.\",\n            \"\",\n            \"Te amo más cada día.\",\n            \"Gracias por ser mi novia.\",\n            \"\",\n            \"Siempre tuyo 💕\"\n        ];\n\n        let leyendo = false;\n        let timeouts = [];\n\n        function limpiarTimeouts() {\n            timeouts.forEach(timeout => clearTimeout(timeout));\n            timeouts = [];\n        }\n\n        function leerCarta() {\n            const carta = document.getElementById('carta');\n            const btn = event.target;\n\n            if (leyendo) {\n                leyendo = false;\n                limpiarTimeouts();\n                carta.innerHTML = '<p style=\"font-style: italic; color: #999;\">Haz clic en \\'Leer Carta\\' para comenzar...</p>';\n                btn.textContent = '📖 Leer Carta';\n                return;\n            }\n\n            leyendo = true;\n            btn.textContent = '⏸️ Pausar';\n            carta.innerHTML = '';\n\n            let delay = 0;\n            cartaTexto.forEach((linea, index) => {\n                const timeout = setTimeout(() => {\n                    const p = document.createElement('p');\n                    p.className = 'linea';\n                    p.innerHTML = linea || '<br>';\n                    p.style.animationDelay = `${index * 0.1}s`;\n                    carta.appendChild(p);\n                }, delay);\n                timeouts.push(timeout);\n                delay += 800;\n            });\n\n            const timeoutFinal = setTimeout(() => {\n                leyendo = false;\n                btn.textContent = '📖 Leer de Nuevo';\n            }, delay);\n            timeouts.push(timeoutFinal);\n        }\n\n        function celebrar() {\n            const corazones = ['❤️', '💕', '💖', '💗', '💝'];\n            for (let i = 0; i < 30; i++) {\n                setTimeout(() => {\n                    const corazon = document.createElement('div');\n                    corazon.className = 'corazon';\n                    corazon.textContent = corazones[Math.floor(Math.random() * corazones.length)];\n                    corazon.style.left = Math.random() * window.innerWidth + 'px';\n                    corazon.style.top = '-50px';\n                    document.body.appendChild(corazon);\n\n                    setTimeout(() => corazon.remove(), 3000);\n                }, i * 100);\n            }\n        }\n\n        // Animación inicial\n        window.addEventListener('load', () => {\n            const carta = document.getElementById('carta');\n            carta.innerHTML = '<div class=\"corazon-grande\">💕</div>';\n        });\n    </script>\n</body>\n</html>"
